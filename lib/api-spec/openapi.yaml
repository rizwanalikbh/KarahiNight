openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Private Karahi Night preorder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: otp
  - name: events
  - name: users
  - name: orders
  - name: summary
  - name: recipes
  - name: adminUsers

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: API is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with name and 4-digit code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current session info
      responses:
        "200":
          description: Session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"

  /otp/send:
    post:
      operationId: sendOtp
      tags: [otp]
      summary: Send OTP to a mobile number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpSendInput"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpSendResult"
        "404":
          description: Mobile not found (loginMode or adminMode)

  /otp/verify:
    post:
      operationId: verifyOtp
      tags: [otp]
      summary: Verify OTP and establish session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerifyInput"
      responses:
        "200":
          description: OTP verified, session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "400":
          description: Invalid or expired OTP

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events (active only for guests, all for admins)
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

    post:
      operationId: createUser
      tags: [users]
      summary: Create a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /users/import-csv:
    post:
      operationId: importUsers
      tags: [users]
      summary: Bulk import guests from CSV data (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserImportResult"

  /users/{id}/regenerate-code:
    post:
      operationId: regenerateCode
      tags: [users]
      summary: Regenerate 4-digit code for a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: New code generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (admin sees all, user sees their own)
      parameters:
        - name: eventId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation failed

  /orders/{id}:
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status or details (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete an order (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /summary:
    get:
      operationId: getSummary
      tags: [summary]
      summary: Get event summary and slot capacities
      parameters:
        - name: eventId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Event summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventSummary"

  /recipes:
    get:
      operationId: listRecipes
      tags: [recipes]
      summary: List all dish recipes (admin only)
      responses:
        "200":
          description: List of recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recipe"
    post:
      operationId: createRecipe
      tags: [recipes]
      summary: Create a dish recipe (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeInput"
      responses:
        "201":
          description: Recipe created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "409":
          description: Recipe for this dish type already exists

  /recipes/{id}:
    patch:
      operationId: updateRecipe
      tags: [recipes]
      summary: Update a dish recipe (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeUpdate"
      responses:
        "200":
          description: Recipe updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "404":
          description: Recipe not found
    delete:
      operationId: deleteRecipe
      tags: [recipes]
      summary: Delete a dish recipe (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin-users:
    get:
      operationId: listAdminUsers
      tags: [adminUsers]
      summary: List all admin users (superuser only)
      responses:
        "200":
          description: List of admin users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

    post:
      operationId: createAdminUser
      tags: [adminUsers]
      summary: Add an admin user (superuser only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserInput"
      responses:
        "201":
          description: Admin user created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin-users/{id}:
    delete:
      operationId: deleteAdminUser
      tags: [adminUsers]
      summary: Remove an admin user (superuser only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /settings/consent-text:
    get:
      operationId: getConsentText
      tags: [settings]
      summary: Get current GDPR consent text
      responses:
        "200":
          description: Consent text value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingValue"
    patch:
      operationId: updateConsentText
      tags: [settings]
      summary: Update GDPR consent text (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingValue"
      responses:
        "200":
          description: Updated value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingValue"

  /settings/order-terms:
    get:
      operationId: getOrderTerms
      tags: [settings]
      summary: Get current order terms and conditions text
      responses:
        "200":
          description: Order terms value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingValue"
    patch:
      operationId: updateOrderTerms
      tags: [settings]
      summary: Update order terms and conditions text (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingValue"
      responses:
        "200":
          description: Updated value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingValue"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginInput:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
        code:
          type: string
          minLength: 4
          maxLength: 4

    AdminUser:
      type: object
      required: [id, mobile, isSuperuser, createdAt]
      properties:
        id:
          type: integer
        mobile:
          type: string
        isSuperuser:
          type: boolean
        createdAt:
          type: string
          format: date-time

    AdminUserInput:
      type: object
      required: [mobile]
      properties:
        mobile:
          type: string
          description: 8-digit Danish number or E.164 format

    LoginResult:
      type: object
      required: [success, role]
      properties:
        success:
          type: boolean
        role:
          type: string
          enum: [user, admin]
        userId:
          type: ["integer", "null"]
        userName:
          type: ["string", "null"]

    SessionInfo:
      type: object
      required: [authenticated, role]
      properties:
        authenticated:
          type: boolean
        role:
          type: ["string", "null"]
          enum: [user, admin, null]
        userId:
          type: ["integer", "null"]
        userName:
          type: ["string", "null"]

    PizzaType:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          description: Dish name (e.g. Chicken Karahi)
        price:
          type: integer
          minimum: 0
          description: Price in DKK
        discountedPrice:
          type: integer
          minimum: 0
          description: Optional discounted price in DKK

    Event:
      type: object
      required: [id, slug, name, date, totalCapacity, slotCapacity, active, slots, pizzaTypes, createdAt]
      properties:
        id:
          type: integer
        slug:
          type: string
          description: 6-character alphanumeric event code used in shareable URLs
        name:
          type: string
        date:
          type: string
          description: ISO date string (YYYY-MM-DD)
        totalCapacity:
          type: integer
        slotCapacity:
          type: integer
        description:
          type: ["string", "null"]
          description: Event description or fundraising note
        orderDeadline:
          type: ["string", "null"]
          format: date-time
          description: Cutoff datetime after which no new orders or edits are accepted
        slots:
          type: array
          items:
            type: string
        pizzaTypes:
          type: array
          items:
            $ref: "#/components/schemas/PizzaType"
        active:
          type: boolean
        maxPerGuest:
          type: ["integer", "null"]
          minimum: 1
          description: Maximum number of dishes a single guest may order. Null means no limit.
        location:
          type: ["string", "null"]
          description: Pickup location name (e.g. "Elm Street 12, 2nd floor")
        locationUrl:
          type: ["string", "null"]
          description: Google Maps or other map URL for the pickup location
        createdAt:
          type: string
          format: date-time

    EventInput:
      type: object
      required: [name, date]
      properties:
        name:
          type: string
        date:
          type: string
          description: ISO date string (YYYY-MM-DD)
        totalCapacity:
          type: integer
          default: 10
        slotCapacity:
          type: integer
          default: 3
        maxPerGuest:
          type: integer
          minimum: 1
          description: Maximum number of dishes a single guest may order. Omit for no limit.
        description:
          type: string
        orderDeadline:
          type: string
          format: date-time
          description: Cutoff datetime after which no new orders or edits are accepted
        location:
          type: string
          description: Pickup location name
        locationUrl:
          type: string
          description: Google Maps or other map URL for the pickup location
        slots:
          type: array
          items:
            type: string
        pizzaTypes:
          type: array
          items:
            $ref: "#/components/schemas/PizzaType"

    EventUpdate:
      type: object
      properties:
        name:
          type: string
        date:
          type: string
        totalCapacity:
          type: integer
        slotCapacity:
          type: integer
        maxPerGuest:
          type: ["integer", "null"]
          minimum: 1
          description: Maximum dishes per guest. Set to null to remove the limit.
        description:
          type: string
        orderDeadline:
          type: ["string", "null"]
          format: date-time
          description: Cutoff datetime after which no new orders or edits are accepted
        slots:
          type: array
          items:
            type: string
        pizzaTypes:
          type: array
          items:
            $ref: "#/components/schemas/PizzaType"
        active:
          type: boolean
        location:
          type: ["string", "null"]
          description: Pickup location name
        locationUrl:
          type: ["string", "null"]
          description: Google Maps or other map URL for the pickup location

    User:
      type: object
      required: [id, name, code, active, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        email:
          type: ["string", "null"]
        mobile:
          type: ["string", "null"]
        active:
          type: boolean
        consentText:
          type: ["string", "null"]
          description: Exact GDPR consent text the user accepted
        consentAcceptedAt:
          type: ["string", "null"]
          format: date-time
          description: When the user accepted the GDPR consent
        createdAt:
          type: string
          format: date-time

    UserInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        email:
          type: string
        mobile:
          type: string

    UserUpdate:
      type: object
      properties:
        active:
          type: boolean
        name:
          type: string
        email:
          type: ["string", "null"]
        mobile:
          type: ["string", "null"]

    UserImportInput:
      type: object
      required: [guests]
      properties:
        guests:
          type: array
          items:
            type: object
            required: [name]
            properties:
              name:
                type: string
              email:
                type: string
              mobile:
                type: string

    UserImportResult:
      type: object
      required: [created, skipped, errors]
      properties:
        created:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string

    PizzaItem:
      type: object
      required: [pizzaChoice, quantity]
      properties:
        pizzaChoice:
          type: string
        quantity:
          type: integer
          minimum: 1
          maximum: 3

    Order:
      type: object
      required: [id, userId, userName, eventId, eventName, eventDate, items, quantity, pickupSlot, status, paid, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        eventId:
          type: integer
        eventName:
          type: string
        eventDate:
          type: string
          description: ISO date string (YYYY-MM-DD) of the event
        items:
          type: array
          items:
            $ref: "#/components/schemas/PizzaItem"
        quantity:
          type: integer
          minimum: 1
          maximum: 3
        pickupSlot:
          type: string
        notes:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, confirmed, declined, completed]
        paid:
          type: boolean
        orderCode:
          type: ["string", "null"]
          description: Unique human-readable reference code for this order
        termsAcceptedAt:
          type: ["string", "null"]
          format: date-time
          description: When the guest accepted the order terms and conditions
        termsText:
          type: ["string", "null"]
          description: Exact T&C text the guest accepted at order time
        createdAt:
          type: string
          format: date-time

    OrderInput:
      type: object
      required: [eventId, items, pickupSlot]
      properties:
        eventId:
          type: integer
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PizzaItem"
        pickupSlot:
          type: string
        notes:
          type: string
        termsText:
          type: string
          description: The T&C text shown to and accepted by the guest

    SettingValue:
      type: object
      required: [value]
      properties:
        value:
          type: string

    OrderUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, declined, completed]
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PizzaItem"
        pickupSlot:
          type: string
        notes:
          type: string
        paid:
          type: boolean

    SlotSummary:
      type: object
      required: [slot, booked, capacity, available]
      properties:
        slot:
          type: string
        booked:
          type: integer
        capacity:
          type: integer
        available:
          type: integer

    RecipeIngredient:
      type: object
      required: [name, quantity, unit]
      properties:
        name:
          type: string
        quantity:
          type: number
        unit:
          type: string

    Recipe:
      type: object
      required: [id, pizzaType, ingredients, updatedAt]
      properties:
        id:
          type: integer
        pizzaType:
          type: string
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredient"
        updatedAt:
          type: string
          format: date-time

    RecipeInput:
      type: object
      required: [pizzaType, ingredients]
      properties:
        pizzaType:
          type: string
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredient"

    RecipeUpdate:
      type: object
      properties:
        pizzaType:
          type: string
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredient"

    OtpSendInput:
      type: object
      required: [mobile]
      properties:
        mobile:
          type: string
          description: Mobile number — 8-digit Danish number or E.164. Backend prepends +45 if no country code.
        name:
          type: string
        consentText:
          type: string
          description: Exact GDPR consent text shown to and accepted by the user (required for new guests)
        loginMode:
          type: boolean
          description: If true, only send OTP if mobile has existing orders; does not create a new user
        adminMode:
          type: boolean
          description: If true, only send OTP if mobile is a registered admin user

    OtpVerifyInput:
      type: object
      required: [mobile, code]
      properties:
        mobile:
          type: string
        code:
          type: string
          minLength: 6
          maxLength: 6
        adminMode:
          type: boolean
          description: If true, verify as admin and create an admin session

    OtpSendResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    EventGuest:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    EventSummary:
      type: object
      required: [eventId, eventName, eventDate, totalCapacity, totalBooked, totalRemaining, orderingOpen, pizzaTypes, slots, guests, maxPerGuest]
      properties:
        eventId:
          type: integer
        eventName:
          type: string
        eventDate:
          type: string
        totalCapacity:
          type: integer
        totalBooked:
          type: integer
        totalRemaining:
          type: integer
        orderingOpen:
          type: boolean
        orderDeadline:
          type: ["string", "null"]
          format: date-time
          description: Cutoff datetime after which no new orders or edits are accepted
        maxPerGuest:
          type: ["integer", "null"]
          description: Maximum dishes per guest for this event. Null means no per-guest limit.
        description:
          type: ["string", "null"]
        pizzaTypes:
          type: array
          items:
            $ref: "#/components/schemas/PizzaType"
        slots:
          type: array
          items:
            $ref: "#/components/schemas/SlotSummary"
        guests:
          type: array
          items:
            $ref: "#/components/schemas/EventGuest"
        location:
          type: ["string", "null"]
          description: Pickup location name
        locationUrl:
          type: ["string", "null"]
          description: Google Maps or other map URL for the pickup location
