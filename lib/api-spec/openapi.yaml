openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Private Pizza Night preorder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: events
  - name: users
  - name: orders
  - name: summary
  - name: segments
  - name: recipes

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with name and 4-digit code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid credentials

  /auth/admin-login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login with password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Admin login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid admin password

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current session info
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionInfo"
        "401":
          description: Not authenticated

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events (admin sees all, user sees their own)
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

    post:
      operationId: createUser
      tags: [users]
      summary: Add a new user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /users/import-csv:
    post:
      operationId: importUsers
      tags: [users]
      summary: Bulk import guests from CSV data (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserImportResult"

  /users/{id}/segments:
    get:
      operationId: listUserSegments
      tags: [users]
      summary: List segments a user belongs to (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Segments for user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Segment"

  /users/{id}/regenerate-code:
    post:
      operationId: regenerateCode
      tags: [users]
      summary: Regenerate 4-digit code for a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: New code generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (admin sees all, user sees their own)
      parameters:
        - name: eventId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation failed

  /orders/{id}:
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status or details (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete an order (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /segments:
    get:
      operationId: listSegments
      tags: [segments]
      summary: List all segments (admin only)
      responses:
        "200":
          description: List of segments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Segment"

    post:
      operationId: createSegment
      tags: [segments]
      summary: Create a segment (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SegmentInput"
      responses:
        "201":
          description: Segment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"

  /segments/{id}:
    patch:
      operationId: updateSegment
      tags: [segments]
      summary: Update a segment's description and tags (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SegmentUpdateInput"
      responses:
        "200":
          description: Segment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Segment"
        "404":
          description: Not found
    delete:
      operationId: deleteSegment
      tags: [segments]
      summary: Delete a segment (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /segments/{id}/users:
    get:
      operationId: listSegmentUsers
      tags: [segments]
      summary: List users in a segment (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Users in segment
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

    post:
      operationId: addUserToSegment
      tags: [segments]
      summary: Add a user to a segment (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SegmentUserInput"
      responses:
        "201":
          description: User added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /segments/{id}/users/{userId}:
    delete:
      operationId: removeUserFromSegment
      tags: [segments]
      summary: Remove a user from a segment (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /events/{id}/segments:
    get:
      operationId: listEventSegments
      tags: [segments]
      summary: List segments assigned to an event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Segments for event
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Segment"

    post:
      operationId: addSegmentToEvent
      tags: [segments]
      summary: Assign a segment to an event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventSegmentInput"
      responses:
        "201":
          description: Segment assigned

  /events/{id}/segments/{segmentId}:
    delete:
      operationId: removeSegmentFromEvent
      tags: [segments]
      summary: Remove a segment from an event (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: segmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /summary:
    get:
      operationId: getSummary
      tags: [summary]
      summary: Get event summary and slot capacities
      parameters:
        - name: eventId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Event summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventSummary"

  /recipes:
    get:
      operationId: listRecipes
      tags: [recipes]
      summary: List all pizza recipes (admin only)
      responses:
        "200":
          description: List of recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recipe"
    post:
      operationId: createRecipe
      tags: [recipes]
      summary: Create a pizza recipe (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeInput"
      responses:
        "201":
          description: Recipe created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "409":
          description: Recipe for this pizza type already exists

  /recipes/{id}:
    patch:
      operationId: updateRecipe
      tags: [recipes]
      summary: Update a pizza recipe (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeUpdate"
      responses:
        "200":
          description: Recipe updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "404":
          description: Recipe not found
    delete:
      operationId: deleteRecipe
      tags: [recipes]
      summary: Delete a pizza recipe (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginInput:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
        code:
          type: string
          minLength: 4
          maxLength: 4
        eventId:
          type: integer
          description: Event the guest is trying to log in for. If provided, login is rejected when the guest is not a member of this event.

    AdminLoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    LoginResult:
      type: object
      required: [success, role]
      properties:
        success:
          type: boolean
        role:
          type: string
          enum: [user, admin]
        userId:
          type: ["integer", "null"]
        userName:
          type: ["string", "null"]

    SessionInfo:
      type: object
      required: [authenticated, role]
      properties:
        authenticated:
          type: boolean
        role:
          type: ["string", "null"]
          enum: [user, admin, null]
        userId:
          type: ["integer", "null"]
        userName:
          type: ["string", "null"]

    Event:
      type: object
      required: [id, slug, name, date, totalCapacity, slotCapacity, price, active, slots, pizzaTypes, createdAt]
      properties:
        id:
          type: integer
        slug:
          type: string
          description: 6-character alphanumeric event code used in shareable URLs
        name:
          type: string
        date:
          type: string
          description: ISO date string (YYYY-MM-DD)
        totalCapacity:
          type: integer
        slotCapacity:
          type: integer
        price:
          type: integer
          description: Price per pizza in DKK
        description:
          type: ["string", "null"]
          description: Event description or fundraising note
        orderDeadline:
          type: ["string", "null"]
          format: date-time
          description: Cutoff datetime after which no new orders or edits are accepted
        slots:
          type: array
          items:
            type: string
        pizzaTypes:
          type: array
          items:
            type: string
        active:
          type: boolean
        segmentDescriptions:
          type: array
          items:
            type: string
          description: Descriptions of segments associated with this event
        createdAt:
          type: string
          format: date-time

    EventInput:
      type: object
      required: [name, date]
      properties:
        name:
          type: string
        date:
          type: string
          description: ISO date string (YYYY-MM-DD)
        totalCapacity:
          type: integer
          default: 10
        slotCapacity:
          type: integer
          default: 3
        price:
          type: integer
          default: 70
        description:
          type: string
        orderDeadline:
          type: string
          format: date-time
          description: Cutoff datetime after which no new orders or edits are accepted
        slots:
          type: array
          items:
            type: string
        pizzaTypes:
          type: array
          items:
            type: string

    EventUpdate:
      type: object
      properties:
        name:
          type: string
        date:
          type: string
        totalCapacity:
          type: integer
        slotCapacity:
          type: integer
        price:
          type: integer
        description:
          type: string
        orderDeadline:
          type: ["string", "null"]
          format: date-time
          description: Cutoff datetime after which no new orders or edits are accepted
        slots:
          type: array
          items:
            type: string
        pizzaTypes:
          type: array
          items:
            type: string
        active:
          type: boolean

    User:
      type: object
      required: [id, name, code, active, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        email:
          type: ["string", "null"]
        mobile:
          type: ["string", "null"]
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        email:
          type: string
        mobile:
          type: string

    UserUpdate:
      type: object
      properties:
        active:
          type: boolean
        name:
          type: string
        email:
          type: ["string", "null"]
        mobile:
          type: ["string", "null"]

    UserImportInput:
      type: object
      required: [guests]
      properties:
        guests:
          type: array
          items:
            type: object
            required: [name]
            properties:
              name:
                type: string
              email:
                type: string
              mobile:
                type: string

    UserImportResult:
      type: object
      required: [created, skipped, errors]
      properties:
        created:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string

    PizzaItem:
      type: object
      required: [pizzaChoice, quantity]
      properties:
        pizzaChoice:
          type: string
          enum: [Margherita, Pepperoni, Special]
        quantity:
          type: integer
          minimum: 1
          maximum: 3

    Order:
      type: object
      required: [id, userId, userName, eventId, eventName, eventDate, items, quantity, pickupSlot, status, paid, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        eventId:
          type: integer
        eventName:
          type: string
        eventDate:
          type: string
          description: ISO date string (YYYY-MM-DD) of the event
        items:
          type: array
          items:
            $ref: "#/components/schemas/PizzaItem"
        quantity:
          type: integer
          minimum: 1
          maximum: 3
        pickupSlot:
          type: string
        notes:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, confirmed, declined, completed]
        paid:
          type: boolean
        createdAt:
          type: string
          format: date-time

    OrderInput:
      type: object
      required: [eventId, items, pickupSlot]
      properties:
        eventId:
          type: integer
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PizzaItem"
        pickupSlot:
          type: string
        notes:
          type: string

    OrderUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, declined, completed]
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PizzaItem"
        pickupSlot:
          type: string
        notes:
          type: string
        paid:
          type: boolean

    Segment:
      type: object
      required: [id, name, memberCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
          description: Short description of this audience segment
        tags:
          type: ["string", "null"]
          description: Comma-separated searchable tags
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    SegmentInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        tags:
          type: string

    SegmentUpdateInput:
      type: object
      properties:
        description:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]

    SegmentUserInput:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer

    EventSegmentInput:
      type: object
      required: [segmentId]
      properties:
        segmentId:
          type: integer

    SlotSummary:
      type: object
      required: [slot, booked, capacity, available]
      properties:
        slot:
          type: string
        booked:
          type: integer
        capacity:
          type: integer
        available:
          type: integer

    RecipeIngredient:
      type: object
      required: [name, quantity, unit]
      properties:
        name:
          type: string
        quantity:
          type: number
        unit:
          type: string

    Recipe:
      type: object
      required: [id, pizzaType, ingredients, updatedAt]
      properties:
        id:
          type: integer
        pizzaType:
          type: string
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredient"
        updatedAt:
          type: string
          format: date-time

    RecipeInput:
      type: object
      required: [pizzaType, ingredients]
      properties:
        pizzaType:
          type: string
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredient"

    RecipeUpdate:
      type: object
      properties:
        pizzaType:
          type: string
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredient"

    EventGuest:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    EventSummary:
      type: object
      required: [eventId, eventName, eventDate, totalCapacity, totalBooked, totalRemaining, orderingOpen, price, pizzaTypes, slots, guests]
      properties:
        eventId:
          type: integer
        eventName:
          type: string
        eventDate:
          type: string
        totalCapacity:
          type: integer
        totalBooked:
          type: integer
        totalRemaining:
          type: integer
        orderingOpen:
          type: boolean
        orderDeadline:
          type: ["string", "null"]
          format: date-time
          description: Cutoff datetime after which no new orders or edits are accepted
        price:
          type: integer
        description:
          type: ["string", "null"]
        pizzaTypes:
          type: array
          items:
            type: string
        slots:
          type: array
          items:
            $ref: "#/components/schemas/SlotSummary"
        guests:
          type: array
          items:
            $ref: "#/components/schemas/EventGuest"
