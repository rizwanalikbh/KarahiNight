kind = "web"
previewPath = "/"
title = "Pizza Night"
version = "1.0.0"
id = "artifacts/pizza-night"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21667

[services.development]
run = "pnpm --filter @workspace/pizza-night run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pizza-night", "run", "build" ]
publicDir = "artifacts/pizza-night/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21667"
BASE_PATH = "/"
